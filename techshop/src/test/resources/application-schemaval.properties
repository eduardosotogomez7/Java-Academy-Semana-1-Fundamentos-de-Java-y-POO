# =============================================================================
# TechShop - Perfil de validacion de schema
# Verifica que init.sql (schema-h2.sql) y las entidades JPA sean consistentes.
# Si hay diferencias en nombres de columnas o tablas, el contexto falla al arrancar.
# =============================================================================

# --- H2 con schema creado desde SQL (no desde las entidades) ---
spring.datasource.url=jdbc:h2:mem:schemavaldb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate solo valida, no genera nada: detecta desajustes con el SQL real
spring.jpa.hibernate.ddl-auto=validate

# Cargar schema-h2.sql antes de que Hibernate valide
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.mode=always

# --- MongoDB deshabilitado ---
spring.data.mongodb.auto-index-creation=false

# --- Spring Batch ---
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
