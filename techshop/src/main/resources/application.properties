# =============================================================================
# TechShop Ecommerce - Configuracion
# =============================================================================

# --- Servidor ---
server.port=8080

# --- MySQL (datos transaccionales: usuarios, carrito, ordenes) ---
spring.datasource.url=jdbc:mysql://localhost:3307/techshop
spring.datasource.username=techshop_user
spring.datasource.password=techshop_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- MongoDB (catalogo: productos, categorias) ---
spring.data.mongodb.uri=mongodb://techshop_user:techshop_pass@localhost:27017/techshop

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Spring Batch (usar MySQL para metadatos del job) ---
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
